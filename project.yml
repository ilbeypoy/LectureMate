name: LectureMate
options:
  bundleIdPrefix: com.ilbeypoy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Ders kaydı için mikrofon gerekiyor"
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Ders transkripti için konuşma tanıma kullanılacak"
    INFOPLIST_KEY_UIBackgroundModes: "audio"
    SWIFT_VERSION: "5.9"

targets:
  LectureMate:
    type: application
    platform: iOS
    sources:
      - path: LectureMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilbeypoy.lecturemate
        INFOPLIST_KEY_CFBundleDisplayName: LectureMate
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
