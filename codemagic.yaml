workflows:
  ios-build:
    name: LectureMate iOS Build
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build iOS App
        script: |
          set -o pipefail
          xcodebuild build \
            -project LectureMate.xcodeproj \
            -scheme LectureMate \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
      - name: Create IPA
        script: |
          cd build/Build/Products/Debug-iphonesimulator
          mkdir -p Payload
          cp -r LectureMate.app Payload/
          zip -r /tmp/LectureMate.ipa Payload
          echo "IPA created at /tmp/LectureMate.ipa"
          ls -lh /tmp/LectureMate.ipa
    artifacts:
      - /tmp/LectureMate.ipa
