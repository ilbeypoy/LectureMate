workflows:
  ios-build:
    name: LectureMate iOS Build
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build for Device
        script: |
          set -o pipefail
          xcodebuild build \
            -project LectureMate.xcodeproj \
            -scheme LectureMate \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
      - name: Create IPA
        script: |
          APP_PATH=$(find build -name "LectureMate.app" -path "*/Debug-iphoneos/*" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LectureMate.ipa Payload
          ls -lh LectureMate.ipa
    artifacts:
      - LectureMate.ipa
