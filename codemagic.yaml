workflows:
  ios-build:
    name: LectureMate iOS Build
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build iOS App
        script: |
          set -o pipefail
          xcodebuild build \
            -project LectureMate.xcodeproj \
            -scheme LectureMate \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build.log
          BUILD_RESULT=$?
          echo "========== ERRORS =========="
          grep "error:" /tmp/build.log || echo "No errors"
          exit $BUILD_RESULT
    artifacts:
      - /tmp/build.log
